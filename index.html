<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WatchThat!</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

<!-- ===== AUTH OVERLAY ===== -->
<div id="authOverlay">
  <div class="auth-card">
    <div class="logo">
      <i class="fas fa-play-circle"></i>
      <span>WatchThat</span>
    </div>
    <p class="subtitle">Watch YouTube without ads</p>

    <button class="btn-primary" id="createAccountBtn">
      <i class="fas fa-user-plus"></i> Get Started
    </button>

    <div id="usernameSelection" style="display: none;">
      <div class="username-grid" id="usernameGrid"></div>
      <div class="hint-text">choose your username</div>
    </div>

    <div class="slider-container" id="sliderContainer">
      <div class="slider-fill" id="sliderFill"></div>
      <div class="slider-text" id="sliderText">
        <i class="fas fa-arrow-right"></i> Slide to verify
      </div>
      <div class="slider-thumb" id="sliderThumb">
        <i class="fas fa-chevron-right"></i>
      </div>
    </div>
    <div class="verify-status" id="verifyStatus"></div>

    <button id="enterAppBtn">Enter WatchThat</button>
  </div>
</div>

<!-- ===== DOWNLOAD POPUP ===== -->
<div class="download-popup" id="downloadPopup">
  <div class="download-popup-content">
    <div class="popup-header">
      <i class="fas fa-download"></i>
      <h3>Download Video</h3>
    </div>
    <p class="popup-subtitle">Choose a download method</p>
    <div class="download-options" id="downloadOptions"></div>
    <button class="btn-close-download" id="closeDownloadBtn">Cancel</button>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<!-- ===== MAIN APP ===== -->
<div id="mainApp">
  <header class="app-header">
    <div class="logo">
      <i class="fas fa-play-circle"></i>
      <span>WatchThat</span>
    </div>
    <div class="header-actions">
      <span class="user-badge" id="displayUsername">
        <i class="fas fa-user"></i> viewer
      </span>
    </div>
  </header>

  <div class="input-section">
    <div class="input-wrapper">
      <i class="fas fa-link input-icon"></i>
      <input type="text" id="youtubeLinkInput" placeholder="Paste YouTube link here...">
    </div>
    <button id="loadVideoBtn">
      <i class="fas fa-play"></i> Watch
    </button>
  </div>

  <div class="video-wrapper" id="videoWrapper">
    <div class="video-container">
      <iframe id="videoIframe" allowfullscreen></iframe>
      <div class="placeholder" id="videoPlaceholder">
        <div class="placeholder-icon">
          <i class="fas fa-film"></i>
        </div>
        <h3>Ready to watch</h3>
        <p>Paste a YouTube link and click Watch</p>
      </div>
    </div>
  </div>

  <div class="controls-row">
    <div class="ctrl-group">
      <button id="downloadBtn">
        <i class="fas fa-download"></i> Download
      </button>
      <button id="newVideoBtn">
        <i class="fas fa-plus-circle"></i> New
      </button>
      <button id="reloadBtn">
        <i class="fas fa-sync-alt"></i> Reload
      </button>
    </div>
    <div class="video-status" id="videoStatus">
      <span class="status-dot"></span>
      no video loaded
    </div>
  </div>

  <div class="footer-meta">
    WatchThat &middot; No ads &middot; Pure video
  </div>
</div>

<!-- ===== SETTINGS BUTTON ===== -->
<button class="settings-btn" id="settingsToggle">
  <i class="fas fa-sliders-h"></i>
  <span>Settings</span>
</button>

<!-- ===== SETTINGS PANEL ===== -->
<div class="settings-panel" id="settingsPanel">
  <div class="settings-header">
    <i class="fas fa-cog"></i>
    <h4>Settings</h4>
  </div>
  
  <div class="setting-group">
    <span class="label">Appearance</span>
    <label class="toggle-item">
      <input type="checkbox" id="darkModeToggle">
      <span class="toggle-label">Dark Mode</span>
    </label>
    <label class="toggle-item">
      <input type="checkbox" id="cinemaModeToggle">
      <span class="toggle-label">Cinema Mode</span>
    </label>
  </div>

  <div class="setting-group">
    <span class="label">Player</span>
    <label class="toggle-item">
      <input type="checkbox" id="autoplayToggle" checked>
      <span class="toggle-label">Autoplay</span>
    </label>
    <label class="toggle-item">
      <input type="checkbox" id="loopToggle">
      <span class="toggle-label">Loop Video</span>
    </label>
  </div>

  <div class="setting-group" style="border-bottom: none; margin-bottom: 0; padding-bottom: 0;">
    <button class="reset-btn" id="resetSettingsBtn">
      <i class="fas fa-undo"></i> Reset All Settings
    </button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
